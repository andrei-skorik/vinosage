name: Unit tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit:
    name: Unit tests (no API)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-mock

      - name: Run unit tests
        # Dummy env vars satisfy config._require() while keeping tools isolated via mocks.
        env:
          OPENROUTER_API_KEY:   dummy-not-used
          SUPABASE_URL:         https://dummy.supabase.co
          SUPABASE_ANON_KEY:    dummy-not-used
          SUPABASE_SERVICE_KEY: dummy-not-used
          ADMIN_PASSWORD:       dummy-not-used
        run: pytest tests/ --tb=short -q
