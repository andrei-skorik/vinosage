name: Reconcile catalog

# Runs daily to sync the CSV catalog and re-embed any wines
# whose content changed since the last embedding (needs_embedding = true).
#
# Trigger manually with "Run workflow" in the GitHub Actions tab.

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily
  workflow_dispatch:

jobs:
  reconcile:
    name: Sync catalog & reconcile embeddings
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run seed (upsert CSV → reconcile stale embeddings)
        env:
          OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:    ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ADMIN_PASSWORD:       ${{ secrets.ADMIN_PASSWORD }}
          EMBEDDING_MODEL:      ${{ secrets.EMBEDDING_MODEL }}
          OPENROUTER_MODEL:     ${{ secrets.OPENROUTER_MODEL }}
        run: python scripts/seed.py

      - name: Report result
        if: always()
        run: echo "Reconcile job finished with status ${{ job.status }}"
